<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Error</title>
<style>
  body { margin:0; font-family:'Segoe UI', system-ui, sans-serif; background:#004578; height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:#fff; border-radius:4px; padding:40px; width:380px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.35); text-align:center; }
  h1 { font-size:18px; color:#201f1e; margin:0 0 8px; }
  p { font-size:13px; color:#605e5c; line-height:1.5; margin:0; }
</style>
</head>
<body>
  <div class="box">
    <h1>Something went wrong</h1>
    <p>An unexpected error occurred. It's been logged — please try again in a moment, or contact your administrator if this continues.</p>
  </div>
</body>
</html>
